# 使用语言
language: node_js

sudo: false

# node版本
node_js:
  - "6"

# 设置只监听哪个分支
branches:
  only:
    - source

# 缓存，可以节省集成的时间，这里我用了yarn，如果不用可以删除
cache:
  yarn: true
  directories:
    - node_modules

# tarvis生命周期执行顺序详见官网文档
before_install:
  - npm install -g hexo-cli

install:
# 不用yarn的话这里改成 npm i 即可
  - yarn install --pure-lockfile